name: Migrate production D1

on:
  workflow_dispatch:
    inputs:
      target_database:
        description: Type the exact production D1 name
        required: true
        type: string
      main_sha:
        description: Type the current full 40-character main commit SHA
        required: true
        type: string
      data_state:
        description: Confirm whether the D1 is empty or has an external verified backup
        required: true
        type: choice
        options:
          - initial-empty
          - existing-backed-up
      backup_sha256:
        description: For existing-backed-up, enter the verified 64-character SHA-256
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: production-d1-migration
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply approved D1 migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      TARGET_DATABASE: ${{ inputs.target_database }}
      CONFIRMED_MAIN_SHA: ${{ inputs.main_sha }}
      DATA_STATE: ${{ inputs.data_state }}
      BACKUP_SHA256: ${{ inputs.backup_sha256 }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm@10.28.1 install --frozen-lockfile

      - name: Validate explicit approval inputs
        shell: bash
        run: |
          set -euo pipefail
          test "$TARGET_DATABASE" = "event-roster"
          test "$CONFIRMED_MAIN_SHA" = "$(git rev-parse HEAD)"
          case "$DATA_STATE" in
            initial-empty)
              test -z "$BACKUP_SHA256"
              ;;
            existing-backed-up)
              [[ "$BACKUP_SHA256" =~ ^[0-9a-fA-F]{64}$ ]]
              ;;
            *)
              exit 1
              ;;
          esac

      - name: Verify an initial database is empty
        if: inputs.data_state == 'initial-empty'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          corepack pnpm@10.28.1 --filter @event-roster/worker exec wrangler d1 execute event-roster --remote --json --command \
            "SELECT COUNT(*) AS application_table_count FROM sqlite_master WHERE type = 'table' AND name NOT LIKE 'sqlite_%' AND name != 'd1_migrations'" \
            > "$RUNNER_TEMP/d1-empty-check.json"
          node --input-type=module -e '
            import { readFileSync } from "node:fs";
            const payload = JSON.parse(readFileSync(process.argv[1], "utf8"));
            if (!Array.isArray(payload) || payload.length !== 1) {
              throw new Error("Expected exactly one D1 result set");
            }
            const [entry] = payload;
            if (entry === null || typeof entry !== "object" || entry.success !== true || !Array.isArray(entry.results) || entry.results.length !== 1) {
              throw new Error("Unexpected D1 empty-check response");
            }
            const [row] = entry.results;
            if (row === null || typeof row !== "object" || Array.isArray(row) || !Object.hasOwn(row, "application_table_count")) {
              throw new Error("D1 empty-check count is missing");
            }
            const count = row.application_table_count;
            if (!Number.isSafeInteger(count) || count < 0) {
              throw new Error(`Invalid D1 application-table count: ${String(count)}`);
            }
            if (count !== 0) {
              throw new Error(`Expected an empty D1, found ${String(count)} application tables`);
            }
          ' "$RUNNER_TEMP/d1-empty-check.json"

      - name: List pending migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: corepack pnpm@10.28.1 --filter @event-roster/worker exec wrangler d1 migrations list event-roster --remote

      - name: Apply migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: corepack pnpm@10.28.1 --filter @event-roster/worker exec wrangler d1 migrations apply event-roster --remote

      - name: Check foreign keys
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          corepack pnpm@10.28.1 --filter @event-roster/worker exec wrangler d1 execute event-roster --remote --json --command \
            "PRAGMA foreign_key_check" > "$RUNNER_TEMP/d1-foreign-key-check.json"
          node --input-type=module -e '
            import { readFileSync } from "node:fs";
            const payload = JSON.parse(readFileSync(process.argv[1], "utf8"));
            if (!Array.isArray(payload) || payload.length !== 1) {
              throw new Error("Expected exactly one D1 result set");
            }
            const [entry] = payload;
            if (entry === null || typeof entry !== "object" || entry.success !== true || !Array.isArray(entry.results)) {
              throw new Error("Unexpected D1 foreign-key-check response");
            }
            if (entry.results.length !== 0) {
              throw new Error(`Found ${entry.results.length} foreign-key violations`);
            }
          ' "$RUNNER_TEMP/d1-foreign-key-check.json"

      - name: Check organization assignments
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          corepack pnpm@10.28.1 --filter @event-roster/worker exec wrangler d1 execute event-roster --remote --json --command \
            "SELECT assignment_role, COUNT(*) AS assignment_count FROM user_organizations GROUP BY assignment_role" \
            > "$RUNNER_TEMP/d1-assignment-role-check.json"
          node --input-type=module -e '
            import { readFileSync } from "node:fs";
            const payload = JSON.parse(readFileSync(process.argv[1], "utf8"));
            if (!Array.isArray(payload) || payload.length !== 1) {
              throw new Error("Expected exactly one D1 result set");
            }
            const [entry] = payload;
            if (entry === null || typeof entry !== "object" || entry.success !== true || !Array.isArray(entry.results)) {
              throw new Error("Unexpected D1 assignment-role-check response");
            }
            const allowedRoles = new Set(["PRIMARY_LEADER", "MANAGER"]);
            const seenRoles = new Set();
            for (const [index, row] of entry.results.entries()) {
              if (row === null || typeof row !== "object" || Array.isArray(row)) {
                throw new Error(`Invalid assignment-role row at index ${index}`);
              }
              const role = row.assignment_role;
              if (!allowedRoles.has(role)) {
                throw new Error(`Unexpected assignment role at index ${index}`);
              }
              if (seenRoles.has(role)) {
                throw new Error(`Duplicate assignment-role row at index ${index}`);
              }
              seenRoles.add(role);
              const count = row.assignment_count;
              if (!Number.isSafeInteger(count) || count < 0) {
                throw new Error(`Invalid assignment count at index ${index}`);
              }
            }
          ' "$RUNNER_TEMP/d1-assignment-role-check.json"
          corepack pnpm@10.28.1 --filter @event-roster/worker exec wrangler d1 execute event-roster --remote --json --command \
            "SELECT organization_id, COUNT(*) AS primary_count FROM user_organizations WHERE assignment_role = 'PRIMARY_LEADER' GROUP BY organization_id HAVING COUNT(*) > 1" \
            > "$RUNNER_TEMP/d1-primary-leader-check.json"
          node --input-type=module -e '
            import { readFileSync } from "node:fs";
            const payload = JSON.parse(readFileSync(process.argv[1], "utf8"));
            if (!Array.isArray(payload) || payload.length !== 1) {
              throw new Error("Expected exactly one D1 result set");
            }
            const [entry] = payload;
            if (entry === null || typeof entry !== "object" || entry.success !== true || !Array.isArray(entry.results)) {
              throw new Error("Unexpected D1 primary-leader-check response");
            }
            if (entry.results.length !== 0) {
              throw new Error(`Found ${entry.results.length} organizations with duplicate primary leaders`);
            }
          ' "$RUNNER_TEMP/d1-primary-leader-check.json"
